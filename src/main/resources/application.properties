spring.application.name=intern-task-manager
server.port=8080
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=intern_task_manager;encrypt=false}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

