# ==========================================
# Profile: DEV (local development)
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=intern_task_manager;encrypt=false
spring.datasource.username=sa
spring.datasource.password=123

# Show SQL in dev for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=devSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong
jwt.expiration-ms=86400000

# Logging
logging.level.com.example.manager=DEBUG
logging.level.org.springframework.security=DEBUG
